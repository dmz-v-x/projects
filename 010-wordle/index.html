<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle Game</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="game">
    <h1>Wordle</h1>
    <p class="subtitle">Guess the 5-letter word in 6 tries.</p>

    <p id="message" class="message" aria-live="polite">Type a word and press Enter.</p>

    <section id="board" class="board" aria-label="Wordle board"></section>

    <section id="keyboard" class="keyboard" aria-label="On-screen keyboard"></section>

    <button id="resetBtn" class="reset" type="button">New Game</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
