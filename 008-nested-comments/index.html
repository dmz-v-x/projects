<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested Comments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Nested Comments</h1>
    <p class="subtitle">Post comments and reply to any thread level.</p>

    <form id="rootCommentForm" class="composer">
      <input id="rootAuthor" type="text" placeholder="Your name" required>
      <textarea id="rootText" rows="3" placeholder="Write a comment..." required></textarea>
      <button type="submit">Add Comment</button>
    </form>

    <section id="commentList" class="comment-list" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
