
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Application</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>Weather Application</h1>
      <p>Search any city to view current weather and forecast.</p>
    </header>

    <section class="search-panel">
      <form id="searchForm" class="search-form">
        <input id="cityInput" type="text" placeholder="Enter city name (e.g., Delhi)" required>
        <button type="submit">Search</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section id="weatherCard" class="weather-card hidden">
      <div class="current">
        <div>
          <h2 id="locationName">-</h2>
          <p id="currentSummary">-</p>
        </div>
        <div class="temp-box">
          <span id="currentTemp">--</span>
          <small>&deg;C</small>
        </div>
      </div>

      <div class="metrics">
        <div><small>Feels Like</small><strong id="feelsLike">--&deg;C</strong></div>
        <div><small>Humidity</small><strong id="humidity">--%</strong></div>
        <div><small>Wind</small><strong id="windSpeed">-- km/h</strong></div>
      </div>

      <h3>5-Day Forecast</h3>
      <div id="forecastList" class="forecast-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
